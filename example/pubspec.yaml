name: layer_canvas_example
description: >-
  Generates a GPS-style photo watermark using layer_canvas from pure Dart —
  no Flutter required.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.12.2

dependencies:
  layer_canvas:
    # When depending on this package from a real application you should use:
    #   layer_canvas: ^x.y.z
    # The example is bundled with the package, so it uses a path dependency
    # on the parent directory to pick up the current version.
    path: ../

dev_dependencies:
  lints: ^6.0.0
