name: layer_canvas_dart_ui_benchmark
description: >-
  Cross-tool comparison benchmark for layer_canvas — renders the same
  scenes as benchmark/render_benchmark.dart and
  benchmark/image_package_benchmark.dart, but via dart:ui
  (Canvas/PictureRecorder) instead of layer_canvas's own Blend2D backend,
  so the reported numbers can be compared side by side.
publish_to: 'none'
version: 1.0.0

# This is the one place in the repo that depends on Flutter. layer_canvas
# itself is intentionally Flutter-free (see the root README) — dart:ui
# can't rasterize outside a Flutter engine, so this comparison lives in
# its own standalone project instead of the main package's dev_dependencies.
environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  benchmark_harness: ^2.3.0
  flutter_test:
    sdk: flutter
