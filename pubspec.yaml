name: layer_canvas
description: >-
  High-performance 2D compositing engine for Dart and Flutter, using
  Blend2D via FFI to render typed Layers to PNG at native speed.
version: 0.1.0-beta.2
homepage: https://github.com/code3743/layer_canvas
repository: https://github.com/code3743/layer_canvas
issue_tracker: https://github.com/code3743/layer_canvas/issues

environment:
  sdk: ^3.12.2

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.1.4
  hooks: ^2.0.2
  logging: ^1.3.0
  native_toolchain_c: ^0.19.2
  xml: ^7.0.1

dev_dependencies:
  benchmark_harness: ^2.3.0
  ffigen: ^20.1.1
  image: ^4.9.1
  lints: ^6.0.0
  test: ^1.28.0
